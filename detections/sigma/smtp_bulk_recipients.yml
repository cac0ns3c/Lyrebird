title: Bulk-Recipient Mail Captured By Lab Emulator (Possible Mass Mailer)
id: 1b2c3d4e-5f60-4718-9a2b-3c4d5e6f7081
status: experimental
description: >
  A single message addressed to many recipients, captured by the Lyrebird SMTP
  emulator, is consistent with mass-mailing or spam-bot malware. Pair:
  services/smtp.py tags these 'bulk-recipients'.
author: Lyrebird
date: 2026/06/29
logsource:
  product: lyrebird
  service: smtp
detection:
  selection:
    service: 'smtp'
    tags|contains: 'bulk-recipients'
  condition: selection
fields:
  - src_ip
  - request.mail_from
  - request.rcpt_tos
falsepositives:
  - Legitimate bulk mail (unlikely from a sample under analysis)
level: medium
