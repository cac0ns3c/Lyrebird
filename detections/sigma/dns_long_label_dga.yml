title: Suspicious Long DNS Label Against Lab Emulator (Possible DGA / Tunneling)
id: 7f1c2a8e-3b4d-4e2a-9c11-0a1b2c3d4e5f
status: experimental
description: >
  Flags DNS queries with an unusually long leftmost label observed against the
  Lyrebird DNS emulator. Long, high-entropy labels are characteristic of domain
  generation algorithms and DNS tunneling. Pair: emitted by services/dns.py and
  services/dns_tcp.py, which tag such queries 'long-label' — tunneling commonly
  falls back to TCP for larger payloads, so both transports are in scope.
references:
  - https://www.inetsim.org/
author: Lyrebird
date: 2026/06/29
logsource:
  product: lyrebird
  service: dns
detection:
  selection:
    service:
      - 'dns'
      - 'dns_tcp'
    tags|contains: 'long-label'
  condition: selection
fields:
  - src_ip
  - request.qname
  - request.qtype
falsepositives:
  - Legitimate services that use long subdomain labels (rare in a malware lab)
level: medium
