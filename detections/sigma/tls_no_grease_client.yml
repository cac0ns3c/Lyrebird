title: TLS 1.3 ClientHello Without GREASE (Possible Automation or Malware)
id: 3f84c291-b702-4e8a-9d63-02a4e7c15a77
status: experimental
description: >
  Modern browsers (Chrome, Firefox, Edge) always send at least one GREASE value
  (RFC 8701) in the ClientHello to probe extension-point ossification. A TLS 1.3
  ClientHello that carries no GREASE is a reliable indicator that the client is
  NOT a stock browser — it is likely an automated tool, a custom TLS stack, or
  malware. Pair: services/tls_capture.py and services/tls.py tag such connections
  'no-grease' when grease_present is False and TLS 1.3 was offered. The enrichment
  fields grease_present, ja4_r, and supported_versions are also recorded for
  deeper fingerprint analysis.
author: Lyrebird
date: 2026/06/30
logsource:
  product: lyrebird
  service: tls_capture
detection:
  selection:
    tags|contains: 'no-grease'
  condition: selection
fields:
  - src_ip
  - request.ja3
  - request.ja4
  - request.ja4_r
  - request.sni
  - request.grease_present
  - request.supported_versions
falsepositives:
  - Non-browser TLS clients that are legitimately GREASE-free (e.g. embedded IoT,
    older mobile SDKs, custom test harnesses)
  - TLS libraries that post-date GREASE but are not yet wired to send it
level: medium
