name: Publish to PyPI

# Publishes lyrebird-emulator to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token secret required.
# One-time setup on PyPI: add a Trusted Publisher for project "lyrebird-emulator"
#   owner: cac0ns3c   repo: Lyrebird   workflow: publish.yml   environment: pypi
# (see https://docs.pypi.org/trusted-publishers/). `workflow_dispatch` lets you
# publish the current main manually once that publisher exists.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata with twine
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/lyrebird-emulator
    permissions:
      id-token: write        # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent: don't fail a re-run when a file for this version is
          # already on PyPI (versions are immutable — bump the version to
          # publish new content).
          skip-existing: true
