# SPDX-License-Identifier: GPL-3.0-or-later
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: PYTHONPATH=src python -m pytest tests/ -q

  sigma-lint:
    name: sigma lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Lint Sigma rules
        run: python scripts/lint_sigma.py

  smoke:
    name: import + CLI smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -r requirements.txt
      - name: Import package and show CLI help
        run: |
          PYTHONPATH=src python -c "import lyrebird, lyrebird.orchestrator, lyrebird.beacons, lyrebird.mimicry"
          PYTHONPATH=src python -m lyrebird --help
